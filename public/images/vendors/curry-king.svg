<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9800" />
      <stop offset="100%" stop-color="#F44336" />
    </linearGradient>
    <filter id="shadowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="4" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="texture" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="white" opacity="0.05" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- Pattern Overlay -->
  <rect width="100%" height="100%" fill="url(#texture)" />
  
  <!-- Title Text -->
  <text 
    x="50%" 
    y="45%" 
    font-family="Arial, sans-serif" 
    font-size="60" 
    font-weight="bold" 
    fill="white" 
    text-anchor="middle"
    filter="url(#shadowEffect)"
  >
    Curry King
  </text>
  
  <!-- Subtitle Text -->
  <text 
    x="50%" 
    y="60%" 
    font-family="Arial, sans-serif" 
    font-size="30" 
    fill="white" 
    text-anchor="middle"
    filter="url(#shadowEffect)"
  >
    Authentic Indian Cuisine
  </text>
</svg> 